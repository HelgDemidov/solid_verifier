# комментарий (ru): Файл конфигурации сборки проекта
[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "solid_dashboard"
version = "0.1.0"
description = "Python Code Inventory & Architecture Dashboard"
requires-python = ">=3.10"

# Нижние границы >= cовпадают с локально установленными версиями
# Верхние границы <X.0.0 страхуют от мажорных изменений API
# Позднее в dependencies необходимо будет добавить openai 

dependencies = [
    # Block 1 — static metrics
    "radon>=6.0.1,<7.0.0",
    "cohesion>=1.2.0,<2.0.0",

    # Block 2 — architecture contracts & graphs
    "import-linter>=2.11,<3.0.0", # изначально была жесткая привязка к версии 3 2.2.2 из-за использования Python API
    "pyan3>=2.2.2,<3.0.0", # адаптер pyan3222
    "networkx>=3.0.0,<4.0.0", # также для адаптера pyan3222

    # Block 3 — core & reporting
    "pydantic>=2.12.5,<3.0.0",
    "Jinja2>=3.1.6,<4.0.0",

    # Block 4 - HTTP client
    "httpx>=0.24.0",
]

[project.scripts]
solid-dashboard = "solid_dashboard.__main__:main"
