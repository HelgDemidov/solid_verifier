[pytest]
# Базовые пути для поиска тестов внутри пакета
testpaths = 
    tests

# Разрешаем импорты из корня пакета solid_verifier
pythonpath = .

# Убираем предупреждения asyncio (если у тебя есть асинхронные тесты в адаптерах)
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Регистрация кастомных маркеров, специфичных для верификатора
markers =
    manual: requires real API key and external HTTP calls; do not run in CI
    integration: marks tests as integration tests (run with -m integration)

# Запуск: 
# cd tools/solid_verifier
# pytest tests -vv
